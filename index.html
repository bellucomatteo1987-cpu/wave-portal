<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WAVE | Neural Interface</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://terminal.jup.ag/main-v6.js" defer></script>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;700&display=swap" rel="stylesheet">
    <style>
        body { background-color: #000; font-family: 'Space Grotesk', sans-serif; margin: 0; overflow-x: hidden; }
        .emerald-glow { border: 1px solid rgba(52, 211, 153, 0.3); box-shadow: 0 0 40px rgba(52, 211, 153, 0.15); }
        #integrated-terminal { width: 100%; min-height: 570px; }
        .risk-terminal { background: rgba(16, 24, 20, 0.9); border: 1px dashed #10b981; padding: 20px; border-radius: 1rem; width: 100%; max-width: 440px; margin-bottom: 20px; }
        .risk-input, .risk-select { background: #000; border: 1px solid #10b981; color: #10b981; padding: 4px 8px; border-radius: 4px; outline: none; font-family: monospace; }
    </style>
</head>
<body class="bg-black text-white">

    <main class="flex flex-col items-center justify-center min-h-screen py-10 px-4">
        <h1 class="text-6xl font-black italic text-emerald-400 mb-2 tracking-tighter uppercase">Wave</h1>
        <p class="text-emerald-500/60 mb-8 font-light tracking-widest uppercase text-xs italic">Neural Intelligence Interface</p>
        
        <div class="risk-terminal text-emerald-400 font-mono text-xs">
            <div class="flex justify-between mb-4 border-b border-emerald-900 pb-2">
                <span class="font-bold tracking-tighter uppercase">[ Risk Terminal v.1.2 ]</span>
                <span class="animate-pulse">● Protocollo Attivo</span>
            </div>
            <div class="space-y-3">
                <div class="flex justify-between items-center">
                    <span>CAPITALE TOTALE (SOL):</span>
                    <input type="number" id="capitale" class="risk-input text-right" value="10">
                </div>
                <div class="mt-4 pt-3 border-t border-emerald-900 flex justify-between items-center text-sm font-bold bg-emerald-950/30 p-2 rounded">
                    <span>ESPOSIZIONE SICURA:</span>
                    <span id="risultato" class="text-white">0.200 SOL</span>
                </div>
            </div>
        </div>

        <div class="w-full max-w-[440px] rounded-3xl overflow-hidden emerald-glow bg-[#0b0e11] mb-8">
            <div id="integrated-terminal"></div>
        </div>

        <a href="https://dub.sh/WAVEPortal" target="_blank" class="group flex flex-col items-center transition-all hover:scale-105">
            <div class="px-8 py-3 bg-emerald-500/10 border border-emerald-500/30 rounded-full text-emerald-400 font-bold tracking-widest text-sm hover:bg-emerald-500/20 transition-all uppercase">
                Entra nel WAVE Whales Portal
            </div>
        </a>
    </main>

    <script>
        // Inizializzazione Terminale con forzatura Fee
        window.addEventListener('load', () => {
            if (window.Jupiter) {
                window.Jupiter.init({
                    displayMode: "integrated",
                    integratedTargetId: "integrated-terminal",
                    endpoint: "https://mainnet.helius-rpc.com/?api-key=8fb0c505-b909-489e-b063-5bd1816f2b43",
                    strictTokenList: false,
                    formProps: {
                        fixedOutputMint: false,
                        platformFeeBps: 100, // FORZATURA 1%
                    },
                    referrerAccount: "BVWRM1aANKbGNsJvijNG4HEU2GtDfGhU3xjf4NYqoSPa"
                });
            }
        });

        // Logica calcolo rischio (semplificata)
        const capInput = document.getElementById('capitale');
        const resDiv = document.getElementById('risultato');
        capInput.addEventListener('input', () => {
            resDiv.innerText = `${(parseFloat(capInput.value || 0) * 0.02).toFixed(3)} SOL`;
        });
    </script>
</body>
</html>
