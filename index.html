<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>$WAVE | Neural Motor</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/@solana/web3.js@latest/lib/index.iife.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;700&display=swap" rel="stylesheet">
    <style>
        body { background-color: #000000; color: #ffffff; margin: 0; overflow-x: hidden; font-family: sans-serif; }
        .neon-border { border: 1px solid rgba(20, 241, 149, 0.4); box-shadow: 0 0 25px rgba(20, 241, 149, 0.1); }
        .neon-text { text-shadow: 0 0 10px rgba(20, 241, 149, 0.8); color: rgba(20, 241, 149, 1); }
        .font-vision { font-family: 'Space Grotesk', sans-serif; }
        .terminal-container { width: 100%; height: 600px; background: #000; overflow: hidden; position: relative; }
        iframe { width: 100%; height: 100%; border: none; color-scheme: dark; }
        input, select { background: rgba(255,255,255,0.05) !important; border: 1px solid rgba(255,255,255,0.1) !important; color: white !important; }
    </style>
</head>
<body class="min-h-screen flex flex-col items-center py-10 px-4 bg-[radial-gradient(circle_at_top,_var(--tw-gradient-stops))] from-emerald-900/10 via-black to-black">

    <header class="mb-8 text-center">
        <div class="mb-5 inline-block">
            <img src="logo.png" alt="$WAVE Logo" class="w-32 h-32 rounded-full neon-border object-cover mx-auto">
        </div>
        <h1 class="text-6xl font-black font-vision tracking-tighter uppercase italic neon-text">$WAVE MOTOR</h1>
        <p class="text-[10px] tracking-[0.3em] text-white/40 mt-2 uppercase italic">Solana Neural Interface v3.5</p>
    </header>

    <main class="w-full max-w-md space-y-6">
        <div class="neon-border rounded-3xl overflow-hidden bg-black p-1">
            <div class="terminal-container">
                <iframe 
                    src="https://raydium.io/swap/?inputMint=sol&outputMint=2VdMzwpQojoqWQmQYZrtwVChBGeoBz32m1KgdMjipump" 
                    title="Raydium Swap">
                </iframe>
            </div>
        </div>

        <div class="bg-white/5 border border-white/10 p-4 rounded-xl flex justify-between items-center group">
            <code id="ca-text" class="text-[10px] text-emerald-400/70 truncate mr-4 italic">2VdMzwpQojoqWQmQYZrtwVChBGeoBz32m1KgdMjipump</code>
            <button onclick="copyCA()" id="copy-btn" class="text-[10px] uppercase font-bold bg-emerald-400 text-black px-3 py-1.5 rounded transition-all active:scale-95 hover:bg-white">Copy CA</button>
        </div>

        <div class="bg-black border border-emerald-500/20 p-6 rounded-2xl relative overflow-hidden shadow-2xl">
            <div id="lock-overlay" class="absolute inset-0 bg-black/95 backdrop-blur-md z-10 flex flex-col items-center justify-center p-6 text-center">
                <p class="text-emerald-400 font-vision font-bold uppercase tracking-widest mb-4 italic text-xs italic">Diamond Check Required</p>
                <input type="text" id="wallet-input" placeholder="Paste: 2Pag...YxTR" class="w-full p-3 rounded-lg mb-3 text-xs outline-none focus:border-emerald-400">
                <button id="verify-btn" class="w-full py-3 bg-emerald-500 text-black font-black rounded-lg text-[10px] uppercase tracking-tighter hover:bg-white transition-all">Verify My $WAVE</button>
                <p id="verify-status" class="mt-2 text-[9px] text-white/30 uppercase italic"></p>
            </div>

            <div class="space-y-4">
                <h3 class="text-xl font-bold font-vision text-emerald-400 uppercase italic text-center italic">Risk Terminal</h3>
                <div class="space-y-3">
                    <input type="number" id="total-cap" placeholder="Total SOL Balance" class="w-full p-3 rounded-lg text-xs outline-none">
                    <input type="number" id="risk-perc" placeholder="Risk % (e.g. 1)" class="w-full p-3 rounded-lg text-xs outline-none">
                    <select id="asset-type" class="w-full p-3 rounded-lg text-[10px] outline-none cursor-pointer">
                        <option value="0.1">BLUE CHIP (Safe)</option>
                        <option value="0.3">VOLATILE (Meme)</option>
                        <option value="0.6">DEGEN (Danger)</option>
                    </select>
                    <button id="calc-btn" class="w-full py-3 border border-emerald-500/50 text-emerald-400 font-black rounded-xl text-[10px] uppercase hover:bg-emerald-500 hover:text-black transition-all">Analyze Exposure</button>
                </div>
                <div id="result-box" class="hidden mt-4 p-4 bg-emerald-500/5 border border-emerald-500/20 rounded-xl">
                    <p id="result-text" class="text-[11px] font-vision leading-tight text-white/90 italic"></p>
                </div>
            </div>
        </div>
    </main>

   <script>
    const WAVE_CA = "2VdMzwpQojoqWQmQYZrtwVChBGeoBz32m1KgdMjipump";
    let clickCount = 0; // Contatore per il bypass

    document.addEventListener('DOMContentLoaded', () => {
        const verifyBtn = document.getElementById('verify-btn');
        const calcBtn = document.getElementById('calc-btn');

        window.copyCA = function() {
            navigator.clipboard.writeText(WAVE_CA);
            const btn = document.getElementById('copy-btn');
            btn.innerText = 'Copied!';
            setTimeout(() => { btn.innerText = 'Copy CA'; }, 2000);
        };

        verifyBtn.addEventListener('click', async () => {
            const walletStr = document.getElementById('wallet-input').value.trim();
            const status = document.getElementById('verify-status');

            if (!walletStr) {
                status.innerText = "Inserisci l'indirizzo dello screenshot.";
                return;
            }

            clickCount++;
            status.innerText = `Scansione in corso... (Tentativo ${clickCount}/3)`;
            verifyBtn.disabled = true;

            // LOGICA DI BYPASS: Al terzo tentativo apre comunque
            if (clickCount >= 3) {
                status.innerText = "Bypass di emergenza attivo. Benvenuto Socio.";
                setTimeout(() => { 
                    document.getElementById('lock-overlay').style.display = 'none'; 
                }, 600);
                return;
            }

            try {
                const connection = new solanaWeb3.Connection("https://api.mainnet-beta.solana.com", "confirmed");
                const pubKey = new solanaWeb3.PublicKey(walletStr);
                
                const tokenAccounts = await connection.getParsedTokenAccountsByOwner(pubKey, {
                    mint: new solanaWeb3.PublicKey(WAVE_CA)
                });

                if (tokenAccounts.value.length > 0) {
                    const balance = tokenAccounts.value[0].account.data.parsed.info.tokenAmount.uiAmount;
                    if (balance > 0) {
                        status.innerText = "Verifica completata. Apertura...";
                        setTimeout(() => { document.getElementById('lock-overlay').style.display = 'none'; }, 600);
                    } else {
                        status.innerText = "Saldo insufficiente. Riprova per bypassare.";
                        verifyBtn.disabled = false;
                    }
                } else {
                    status.innerText = "Token non trovato. Clicca ancora per bypassare.";
                    verifyBtn.disabled = false;
                }
            } catch (e) {
                status.innerText = "Errore di rete. Riprova per sbloccare.";
                verifyBtn.disabled = false;
            }
        });

        // Logica Risk Terminal (Matematica della Prudenza)
        if (calcBtn) {
            calcBtn.addEventListener('click', () => {
                const cap = parseFloat(document.getElementById('total-cap').value);
                const rsk = parseFloat(document.getElementById('risk-perc').value);
                const vol = parseFloat(document.getElementById('asset-type').value);
                
                if (isNaN(cap) || isNaN(rsk)) return;

                const size = (cap * (rsk / 100)) / vol;
                const resBox = document.getElementById('result-box');
                resBox.classList.remove('hidden');
                document.getElementById('result-text').innerHTML = `
                    <span class="text-emerald-400 font-bold uppercase">Size Suggerita:</span> ${size.toFixed(3)} SOL<br><br>
                    <span class="text-[9px] text-white/40 italic uppercase">Protocollo Sodo e Prudente: Proteggi il Capitale.</span>`;
            });
        }
    });
</script>
</body>
</html>
