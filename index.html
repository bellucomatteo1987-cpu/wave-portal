<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>$WAVE | Neural Motor</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;700&display=swap" rel="stylesheet">
    <style>
        body { background-color: #000000; color: #ffffff; margin: 0; overflow-x: hidden; font-family: sans-serif; }
        .neon-border { border: 1px solid rgba(20, 241, 149, 0.4); box-shadow: 0 0 25px rgba(20, 241, 149, 0.1); }
        .neon-text { text-shadow: 0 0 10px rgba(20, 241, 149, 0.8); color: rgba(20, 241, 149, 1); }
        .font-vision { font-family: 'Space Grotesk', sans-serif; }
        .terminal-container { width: 100%; height: 600px; background: #000; overflow: hidden; position: relative; }
        iframe { width: 100%; height: 100%; border: none; color-scheme: dark; }
        
        /* Echo Board Styling */
        #msg-list { scrollbar-width: thin; scrollbar-color: rgba(20, 241, 149, 0.3) transparent; }
        #msg-list::-webkit-scrollbar { width: 4px; }
        #msg-list::-webkit-scrollbar-thumb { background: rgba(20, 241, 149, 0.3); border-radius: 10px; }
    </style>
</head>
<body class="min-h-screen flex flex-col items-center py-10 px-4 bg-[radial-gradient(circle_at_top,_var(--tw-gradient-stops))] from-emerald-900/10 via-black to-black">

    <header class="mb-8 text-center">
        <div class="mb-5 inline-block">
            <img src="logo.png" alt="$WAVE Logo" class="w-32 h-32 rounded-full neon-border object-cover mx-auto">
        </div>
        <h1 class="text-6xl font-black font-vision tracking-tighter uppercase italic neon-text">$WAVE MOTOR</h1>
        <p class="text-[10px] tracking-[0.3em] text-white/40 mt-2 uppercase italic">Solana Neural Interface v3.5</p>
    </header>

    <main class="w-full max-w-md space-y-6">
        <div class="neon-border rounded-3xl overflow-hidden bg-black p-1">
            <div class="terminal-container">
                <iframe src="https://raydium.io/swap/?inputMint=sol&outputMint=2VdMzwpQojoqWQmQYZrtwVChBGeoBz32m1KgdMjipump" title="Raydium Swap"></iframe>
            </div>
        </div>

        <div class="bg-white/5 border border-white/10 p-4 rounded-xl flex justify-between items-center group">
            <code id="ca-text" class="text-[10px] text-emerald-400/70 truncate mr-4 italic">2VdMzwpQojoqWQmQYZrtwVChBGeoBz32m1KgdMjipump</code>
            <button onclick="copyCA()" id="copy-btn" class="text-[10px] uppercase font-bold bg-emerald-400 text-black px-3 py-1.5 rounded transition-all active:scale-95 hover:bg-white">Copy CA</button>
        </div>

        <div class="bg-black border border-emerald-500/20 p-6 rounded-2xl relative overflow-hidden shadow-2xl">
            <div id="lock-overlay" class="absolute inset-0 bg-black/95 backdrop-blur-md z-10 flex flex-col items-center justify-center p-6 text-center">
                <h2 class="text-emerald-400 font-vision font-bold uppercase tracking-widest mb-1 text-sm italic">THE WAVE ECHO</h2>
                <p class="text-[9px] text-white/50 uppercase mb-4 tracking-tighter italic">Broadcast your signal to the network</p>
                
                <input type="text" id="user-msg" placeholder="Write a degen phrase..." maxlength="50" class="w-full p-3 rounded-lg mb-3 text-xs outline-none border border-white/10 bg-white/5 text-white focus:border-emerald-400">
                
                <button id="verify-btn" class="w-full py-3 bg-[#10f195] text-black font-black rounded-lg text-[10px] uppercase tracking-widest hover:bg-white transition-all shadow-[0_0_15px_rgba(16,241,149,0.3)]">SEND & ACCESS</button>
                
                <div class="w-full mt-6 text-left border-t border-white/5 pt-4">
                    <p class="text-[8px] text-emerald-400/60 uppercase font-bold mb-2 tracking-widest italic">NEURAL PULSE FEED:</p>
                    <ul id="msg-list" class="text-[10px] font-mono text-white/40 space-y-2 overflow-y-auto max-h-[120px] pr-2">
                        </ul>
                </div>
            </div>

            <div class="space-y-4">
                <h3 class="text-xl font-bold font-vision text-emerald-400 uppercase italic text-center">Risk Terminal</h3>
                <div class="space-y-3">
                    <input type="number" id="total-cap" placeholder="Total SOL Balance" class="w-full p-3 rounded-lg text-xs outline-none bg-white/5 border border-white/10 text-white">
                    <input type="number" id="risk-perc" placeholder="Risk % (e.g. 1)" class="w-full p-3 rounded-lg text-xs outline-none bg-white/5 border border-white/10 text-white">
                    <select id="asset-type" class="w-full p-3 rounded-lg text-[10px] outline-none cursor-pointer bg-white/5 border border-white/10 text-white">
                        <option value="0.1">BLUE CHIP (Safe)</option>
                        <option value="0.3">VOLATILE (Meme)</option>
                        <option value="0.6">DEGEN (Danger)</option>
                    </select>
                    <button id="calc-btn" class="w-full py-3 border border-emerald-500/50 text-emerald-400 font-black rounded-xl text-[10px] uppercase hover:bg-emerald-500 hover:text-black transition-all">Analyze Exposure</button>
                </div>
                <div id="result-box" class="hidden mt-4 p-4 bg-emerald-500/5 border border-emerald-500/20 rounded-xl">
                    <p id="result-text" class="text-[11px] font-vision leading-tight text-white/90 italic"></p>
                </div>
            </div>
        </div>
    </main>

<script>
    const WAVE_CA = "2VdMzwpQojoqWQmQYZrtwVChBGeoBz32m1KgdMjipump";

    document.addEventListener('DOMContentLoaded', () => {
        const verifyBtn = document.getElementById('verify-btn');
        const calcBtn = document.getElementById('calc-btn');
        const msgInput = document.getElementById('user-msg');
        const msgList = document.getElementById('msg-list');

        // Initial Spartan Board Messages
        const defaultSignals = ["WAVE Neural Online", "Watching Whales...", "Solana is the future", "LFG $WAVE"];
        
        const loadEcho = () => {
            const signals = JSON.parse(localStorage.getItem('wave_echo_signals') || JSON.stringify(defaultSignals));
            msgList.innerHTML = signals.slice().reverse().map(s => `<li class="border-l border-emerald-500/30 pl-2 py-1 italic break-words">${s}</li>`).join('');
        };
        loadEcho();

        window.copyCA = function() {
            navigator.clipboard.writeText(WAVE_CA);
            const btn = document.getElementById('copy-btn');
            btn.innerText = 'Copied!';
            setTimeout(() => { btn.innerText = 'Copy CA'; }, 2000);
        };

        verifyBtn.addEventListener('click', () => {
            const signal = msgInput.value.trim() || "New user connected";
            
            // Save Signal Locally
            let signals = JSON.parse(localStorage.getItem('wave_echo_signals') || JSON.stringify(defaultSignals));
            signals.push(signal);
            if(signals.length > 20) signals.shift();
            localStorage.setItem('wave_echo_signals', JSON.stringify(signals));

            verifyBtn.innerText = "BROADCASTING...";
            verifyBtn.disabled = true;

            // Visual Transition
            setTimeout(() => {
                const overlay = document.getElementById('lock-overlay');
                overlay.style.transition = "all 0.6s cubic-bezier(0.4, 0, 0.2, 1)";
                overlay.style.opacity = "0";
                overlay.style.transform = "translateY(-40px)";
                setTimeout(() => { overlay.style.display = 'none'; }, 600);
            }, 800);
        });

        if (calcBtn) {
            calcBtn.addEventListener('click', () => {
                const cap = parseFloat(document.getElementById('total-cap').value);
                const rsk = parseFloat(document.getElementById('risk-perc').value);
                const vol = parseFloat(document.getElementById('asset-type').value);
                if (isNaN(cap) || isNaN(rsk)) return;
                
                const size = (cap * (rsk / 100)) / vol;
                const resBox = document.getElementById('result-box');
                resBox.classList.remove('hidden');
                document.getElementById('result-text').innerHTML = `
                    <span class="text-emerald-400 font-bold uppercase">Recommended Size:</span> ${size.toFixed(3)} SOL
