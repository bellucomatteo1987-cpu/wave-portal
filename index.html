<section class="bg-white/5 p-4 rounded-2xl border border-white/10 backdrop-blur-sm neon-border">
    <h2 class="text-xl font-bold mb-4 text-emerald-400 font-vision uppercase tracking-tight text-center">One-Click Deployment</h2>
    <div id="integrated-terminal" style="min-height: 520px; width: 100%;"></div>
</section>

<script>
    // Aspettiamo che la finestra sia caricata completamente
    window.onload = function() {
        if (window.Jupiter) {
            window.Jupiter.init({
                displayMode: "integrated",
                integratedTargetId: "integrated-terminal",
                endpoint: "https://api.mainnet-beta.solana.com", // Assicurati che sia corretta
                strictTokenList: false,
                formProps: {
                    fixedOutputMint: true,
                    initialOutputMint: "IL_TUO_CONTRATTO_WAVE", // METTI QUI IL CA
                },
            });
        } else {
            console.error("Jupiter Script non caricato correttamente");
        }
    };
</script>
