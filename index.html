<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WAVE | Neural Interface</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://terminal.jup.ag/main-v3.js" defer></script>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;700&display=swap" rel="stylesheet">
    <style>
        body { background-color: #000000; color: #ffffff; margin: 0; font-family: 'Space Grotesk', sans-serif; overflow-x: hidden; }
        .neon-border { border: 1px solid rgba(20, 241, 149, 0.4); box-shadow: 0 0 25px rgba(20, 241, 149, 0.1); }
        .neon-text { text-shadow: 0 0 10px rgba(20, 241, 149, 0.8); color: rgba(20, 241, 149, 1); }
    </style>
</head>
<body class="min-h-screen flex flex-col items-center py-10 px-4 bg-[radial-gradient(circle_at_top,_var(--tw-gradient-stops))] from-emerald-900/10 via-black to-black">

    <header class="mb-8 text-center">
        <h1 class="text-6xl font-black tracking-tighter uppercase italic neon-text">WAVE INTERFACE</h1>
        <p class="text-[10px] tracking-[0.3em] text-white/40 mt-2 uppercase italic">Neural Link v3.5.2 | Helius Secured</p>
    </header>

    <main class="w-full max-w-md space-y-6">
        <button id="launch-jupiter" class="w-full py-6 neon-border rounded-2xl bg-black text-[#10f195] font-black uppercase tracking-widest hover:bg-[#10f195] hover:text-black transition-all shadow-[0_0_20px_rgba(16,241,149,0.2)]">
            Launch Jupiter Swap
        </button>

        <div class="bg-black border border-emerald-500/20 p-6 rounded-2xl relative shadow-2xl">
            <div id="lock-overlay" class="absolute inset-0 bg-black/95 backdrop-blur-md z-10 flex flex-col items-center justify-center p-6 text-center rounded-2xl">
                <h2 class="text-emerald-400 font-bold uppercase tracking-widest mb-1 text-sm italic">THE WAVE ECHO</h2>
                <input type="text" id="user-msg" placeholder="Write a degen phrase..." maxlength="50" class="w-full p-3 rounded-lg mb-3 text-xs outline-none border border-white/10 bg-white/5 text-white">
                <button id="verify-btn" class="w-full py-3 bg-[#10f195] text-black font-black rounded-lg text-[10px] uppercase tracking-widest">SEND & ACCESS</button>
            </div>
            <div id="persistent-echo-list" class="text-[10px] font-mono text-white/40 space-y-2 max-h-[80px] overflow-y-auto italic"></div>
        </div>
    </main>

<script>
    const SUPABASE_URL = 'https://ojfplozwfidjwqwpwcdt.supabase.co';
    const SUPABASE_KEY = 'sb_publishable_McakxoSphNnS09S5kcWhIg_iGo705zF';
    const _supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

    function initJupiter() {
        if (window.Jupiter) {
            window.Jupiter.init({
                displayMode: "modal",
                endpoint: "https://mainnet.helius-rpc.com/?api-key=8fb0c505-b909-489e-b063-5bd1816f2b43",
                // FIX: Usiamo la lista 'all' invece di 'strict' per evitare l'errore 404 visto in console
                strictTokenList: false,
                // Proviamo a forzare una lista token pre-caricata se disponibile
                defaultExplorer: "Solscan",
                referralAccount: "BVWRM1aANKbGNsJvijNG4HEU2GtDfGhU3xjf4NYqoSPa",
                platformFeeBps: 20,
                formProps: {
                    initialInputMint: "So11111111111111111111111111111111111111112",
                    initialOutputMint: "EPjFWdd5AufqSSqeM2qN1xzybapC8G4wEGGkZwyTDt1v",
                }
            });
        }
    }

    document.getElementById('launch-jupiter').addEventListener('click', () => {
        if (window.Jupiter && window.Jupiter._instance) { window.Jupiter.resume(); } 
        else { initJupiter(); }
    });

    document.getElementById('verify-btn').addEventListener('click', async () => {
        const val = document.getElementById('user-msg').value.trim();
        await _supabase.from('messages').insert([{ content: val || "Sync" }]);
        document.getElementById('lock-overlay').style.display = 'none';
        
        const { data } = await _supabase.from('messages').select('content').order('created_at', { ascending: false }).limit(5);
        if(data) document.getElementById('persistent-echo-list').innerHTML = data.map(m => `<div>> ${m.content}</div>`).join('');
    });
</script>
</body>
</html>
