<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WAVE | Neural Interface</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://terminal.jup.ag/main-v3.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;700&display=swap" rel="stylesheet">
    <style>
        body { background-color: #000000; color: #ffffff; margin: 0; font-family: 'Space Grotesk', sans-serif; }
        .neon-border { border: 1px solid rgba(20, 241, 149, 0.4); box-shadow: 0 0 20px rgba(20, 241, 149, 0.1); }
        .neon-text { text-shadow: 0 0 10px rgba(20, 241, 149, 0.8); color: #14f195; }
    </style>
</head>
<body class="min-h-screen flex flex-col items-center py-10 px-4 bg-black text-white">

    <header class="mb-8 text-center">
        <h1 class="text-5xl font-black italic neon-text uppercase tracking-tighter">WAVE INTERFACE</h1>
        <p class="text-[9px] tracking-[0.4em] opacity-40 uppercase mt-2">Neural Link v3.5.1 - Secured by Helius</p>
    </header>

    <main class="w-full max-w-md space-y-6">
        <button id="launch-jupiter" class="w-full py-5 neon-border rounded-xl bg-black text-[#14f195] font-bold uppercase tracking-widest hover:bg-[#14f195] hover:text-black transition-all">
            Open Terminal
        </button>

        <div id="wave-terminal" class="bg-[#0a0a0a] border border-white/5 p-6 rounded-2xl relative">
            <div id="lock-overlay" class="absolute inset-0 bg-black/95 z-10 flex flex-col items-center justify-center p-6 rounded-2xl text-center">
                <p class="text-xs text-emerald-400 mb-4 tracking-widest uppercase italic">The Wave Echo</p>
                <input type="text" id="user-msg" placeholder="Degen phrase..." class="w-full p-3 rounded bg-white/5 border border-white/10 text-white text-xs mb-3 outline-none">
                <button id="verify-btn" class="w-full py-3 bg-[#14f195] text-black font-black text-[10px] uppercase rounded">Unlock Access</button>
            </div>
            <div id="msg-feed" class="text-[10px] opacity-30 font-mono h-20 overflow-hidden italic space-y-1"></div>
        </div>
    </main>

<script>
    const SUPABASE_URL = 'https://ojfplozwfidjwqwpwcdt.supabase.co';
    const SUPABASE_KEY = 'sb_publishable_McakxoSphNnS09S5kcWhIg_iGo705zF';
    const _supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

    function startJupiter() {
        if (window.Jupiter) {
            console.log("WAVE: Inizializzazione Terminale...");
            window.Jupiter.init({
                displayMode: "modal",
                // Endpoint Helius con cache busting per forzare il refresh
                endpoint: "https://mainnet.helius-rpc.com/?api-key=8fb0c505-b909-489e-b063-5bd1816f2b43",
                strictTokenList: false,
                referralAccount: "BVWRM1aANKbGNsJvijNG4HEU2GtDfGhU3xjf4NYqoSPa",
                platformFeeBps: 20,
                // Forziamo il caricamento tramite i server di Jupiter se l'RPC è pigro
                defaultExplorer: "Solscan",
                formProps: {
                    initialInputMint: "So11111111111111111111111111111111111111112",
                    initialOutputMint: "EPjFWdd5AufqSSqeM2qN1xzybapC8G4wEGGkZwyTDt1v",
                }
            });
        }
    }

    document.getElementById('launch-jupiter').addEventListener('click', () => {
        if (window.Jupiter && window.Jupiter._instance) {
            window.Jupiter.resume();
        } else {
            startJupiter();
        }
    });

    document.getElementById('verify-btn').addEventListener('click', async () => {
        const msg = document.getElementById('user-msg').value;
        await _supabase.from('messages').insert([{ content: msg || "WAVE Access" }]);
        document.getElementById('lock-overlay').style.display = 'none';
        
        // Carichiamo i messaggi nel feed
        const { data } = await _supabase.from('messages').select('content').order('created_at', { ascending: false }).limit(5);
        if(data) document.getElementById('msg-feed').innerHTML = data.map(d => `<div>> ${d.content}</div>`).join('');
    });
</script>
</body>
</html>
