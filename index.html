<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>$WAVE | Terminal</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@700&display=swap" rel="stylesheet">
    <style>
        body { background-color: #000000; color: #ffffff; margin: 0; overflow-x: hidden; font-family: sans-serif; }
        .neon-border { border: 1px solid rgba(20, 241, 149, 0.4); box-shadow: 0 0 25px rgba(20, 241, 149, 0.1); }
        .font-vision { font-family: 'Space Grotesk', sans-serif; }
        .terminal-container { width: 100%; height: 600px; background: #000; overflow: hidden; position: relative; }
        iframe { width: 100%; height: 100%; border: none; color-scheme: dark; }
    </style>
</head>
<body class="min-h-screen flex flex-col items-center py-10 px-4">

    <header class="mb-8 text-center">
        <h1 class="text-5xl font-black font-vision tracking-tighter uppercase italic text-emerald-400">$WAVE MOTOR</h1>
        <p class="text-[10px] tracking-[0.4em] text-white/40 mt-2 uppercase">Neural Interface - Forced Bridge</p>
    </header>

    <main class="w-full max-w-md space-y-6">
        <div class="neon-border rounded-3xl overflow-hidden bg-black">
            <div class="terminal-container">
                <iframe 
                    src="https://raydium.io/swap/?inputMint=sol&outputMint=2VdMzwpQojoqWQmQYZrtwVChBGeoBz32m1KgdMjipump" 
                    title="Raydium Swap">
                </iframe>
            </div>
        </div>

        <div class="bg-white/5 border border-white/10 p-4 rounded-xl flex justify-between items-center">
            <code id="ca-text" class="text-[10px] text-emerald-400/70 truncate mr-4 italic">2VdMzwpQojoqWQmQYZrtwVChBGeoBz32m1KgdMjipump</code>
            <button onclick="copyCA()" id="copy-btn" class="text-[10px] uppercase font-bold bg-emerald-400 text-black px-3 py-1 rounded transition-all active:scale-95">Copy CA</button>
        </div>

        <div class="space-y-3">
            <a href="https://dub.sh/WAVEPortal" class="flex items-center justify-center w-full py-4 bg-white text-black font-black rounded-xl hover:bg-emerald-400 transition-all uppercase text-sm tracking-tighter">
                Join the Neural Portal
            </a>
            <p class="text-center text-[9px] text-white/20 uppercase tracking-widest leading-tight">
                If tokens don't load, use "Copy CA" and paste it manually into the swap search bar.
            </p>
        </div>
    </main>

    <script>
        function copyCA() {
            const ca = '2VdMzwpQojoqWQmQYZrtwVChBGeoBz32m1KgdMjipump';
            navigator.clipboard.writeText(ca);
            const btn = document.getElementById('copy-btn');
            btn.innerText = 'Copied!';
            btn.classList.replace('bg-emerald-400', 'bg-white');
            setTimeout(() => {
                btn.innerText = 'Copy CA';
                btn.classList.replace('bg-white', 'bg-emerald-400');
            }, 2000);
        }
    </script>

    <footer class="mt-10 opacity-20 text-[9px] uppercase tracking-[0.5em] text-center">
        Motor Status: Active<br>
        Direct Raydium Bridge
    </footer>

</body>
</html>
