<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>$WAVE | Neural Motor</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/@solana/web3.js@latest/lib/index.iife.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;700&display=swap" rel="stylesheet">
    <style>
        body { background-color: #000000; color: #ffffff; margin: 0; overflow-x: hidden; font-family: sans-serif; }
        .neon-border { border: 1px solid rgba(20, 241, 149, 0.4); box-shadow: 0 0 25px rgba(20, 241, 149, 0.1); }
        .neon-text { text-shadow: 0 0 10px rgba(20, 241, 149, 0.8); color: rgba(20, 241, 149, 1); }
        .font-vision { font-family: 'Space Grotesk', sans-serif; }
        .terminal-container { width: 100%; height: 500px; background: #000; overflow: hidden; position: relative; }
        iframe { width: 100%; height: 100%; border: none; color-scheme: dark; }
        .hidden-terminal { display: none; }
        input, select { background: rgba(255,255,255,0.05) !important; border: 1px solid rgba(255,255,255,0.1) !important; color: white !important; }
    </style>
</head>
<body class="min-h-screen flex flex-col items-center py-10 px-4 bg-[radial-gradient(circle_at_top,_var(--tw-gradient-stops))] from-emerald-900/10 via-black to-black">

    <header class="mb-8 text-center">
        <div class="mb-5 inline-block">
            <img src="logo.png" alt="$WAVE Logo" class="w-32 h-32 rounded-full neon-border object-cover mx-auto">
        </div>
        <h1 class="text-6xl font-black font-vision tracking-tighter uppercase italic neon-text">$WAVE MOTOR</h1>
        <p class="text-[10px] tracking-[0.3em] text-white/40 mt-2 uppercase italic">Neural Intelligence Interface v4.0</p>
    </header>

    <main class="w-full max-w-md space-y-6">
        
        <div class="neon-border rounded-3xl overflow-hidden bg-black p-1">
            <div class="terminal-container">
                <iframe 
                    src="https://jup.ag/swap/SOL-2VdMzwpQojoqWQmQYZrtwVChBGeoBz32m1KgdMjipump" 
                    title="Jupiter Swap">
                </iframe>
            </div>
        </div>

        <div class="bg-white/5 border border-white/10 p-4 rounded-xl flex justify-between items-center group">
            <code id="ca-text" class="text-[10px] text-emerald-400/70 truncate mr-4 italic">2VdMzwpQojoqWQmQYZrtwVChBGeoBz32m1KgdMjipump</code>
            <button onclick="copyCA()" id="copy-btn" class="text-[10px] uppercase font-bold bg-emerald-400 text-black px-3 py-1.5 rounded transition-all active:scale-95 hover:bg-white">Copy CA</button>
        </div>

        <div class="bg-black border-2 border-emerald-900/30 p-6 rounded-2xl shadow-2xl relative overflow-hidden">
            <div id="lock-overlay" class="absolute inset-0 bg-black/80 backdrop-blur-md z-10 flex flex-col items-center justify-center p-6 text-center">
                <p class="text-emerald-400 font-vision font-bold uppercase tracking-widest mb-4 italic">Holders Only Access</p>
                <input type="text" id="wallet-input" placeholder="Paste Solana Wallet Address" class="w-full p-3 rounded-lg mb-3 text-xs outline-none focus:border-emerald-400 transition-all">
                <button onclick="verifyHolder()" id="verify-btn" class="w-full py-3 bg-emerald-500 text-black font-black rounded-lg text-xs uppercase tracking-tighter hover:bg-white transition-all">Verify Diamond Hands</button>
                <p id="verify-status" class="mt-2 text-[9px] text-white/30 uppercase italic"></p>
            </div>

            <div class="space-y-4">
                <h3 class="text-xl font-bold font-vision text-emerald-400 uppercase italic">Risk Terminal</h3>
                
                <div class="space-y-3">
                    <div>
                        <label class="text-[9px] uppercase text-white/40 ml-1 italic">Total Capital (SOL)</label>
                        <input type="number" id="total-cap" placeholder="e.g. 10" class="w-full p-3 rounded-lg text-sm outline-none">
                    </div>
                    <div>
                        <label class="text-[9px] uppercase text-white/40 ml-1 italic">Risk Tolerance (%)</label>
                        <input type="number" id="risk-perc" placeholder="e.g. 1" class="w-full p-3 rounded-lg text-sm outline-none">
                    </div>
                    <div>
                        <label class="text-[9px] uppercase text-white/40 ml-1 italic">Asset Volatility</label>
                        <select id="asset-type" class="w-full p-3 rounded-lg text-sm outline-none">
                            <option value="0.1">BLUE CHIP (Safe)</option>
                            <option value="0.3">VOLATILE (Meme)</option>
                            <option value="0.6">DEGEN (Danger)</option>
                        </select>
                    </div>
                    <button onclick="calculateRisk()" class="w-full py-4 bg-emerald-500/10 border border-emerald-500/50 text-emerald-400 font-black rounded-xl text-xs uppercase hover:bg-emerald-500 hover:text-black transition-all">Calculate Exposure</button>
                </div>

                <div id="result-box" class="hidden mt-4 p-4 bg-emerald-500/5 border border-emerald-500/20 rounded-xl">
                    <p id="result-text" class="text-sm font-vision leading-tight"></p>
                </div>
            </div>
        </div>

        <div class="bg-white/5 p-6 rounded-2xl border border-white/10 backdrop-blur-sm">
            <a href="https://dub.sh/WAVEPortal" class="flex items-center justify-center w-full py-4 bg-white text-black font-black rounded-xl hover:bg-emerald-400 hover:scale-105 transition-all uppercase text-sm tracking-tighter">
                Enter the Neural Portal (TG)
            </a>
        </div>
    </main>

    <footer class="mt-12 text-center text-[9px] text-white/10 uppercase tracking-[0.5em] pb-8 italic">
        "Matematica della Prudenza" - Powered by Neural Interface
    </footer>

    <script>
        const WAVE_CA = "2VdMzwpQojoqWQmQYZrtwVChBGeoBz32m1KgdMjipump";

        async function verifyHolder() {
            const wallet = document.getElementById('wallet-input').value;
            const status = document.getElementById('verify-status');
            const btn = document.getElementById('verify-btn');

            if(!wallet) return;
            
            status.innerText = "Scanning Blockchain...";
            btn.disabled = true;

            try {
                const connection = new solanaWeb3.Connection("https://api.mainnet-beta.solana.com");
                const publicKey = new solanaWeb3.PublicKey(wallet);
                
                // Cerchiamo i token account del wallet
                const response = await connection.getParsedTokenAccountsByOwner(publicKey, {
                    mint: new solanaWeb3.PublicKey(WAVE_CA)
                });

                if (response.value.length > 0) {
                    const balance = response.value[0].account.data.parsed.info.tokenAmount.uiAmount;
                    if (balance > 0) {
                        status.innerText = "Identity Confirmed. Welcome Socio.";
                        setTimeout(() => {
                            document.getElementById('lock-overlay').style.display = 'none';
                        }, 1000);
                    } else {
                        status.innerText = "Zero $WAVE detected. Purchase required.";
                        btn.disabled = false;
                    }
                } else {
                    status.innerText = "No $WAVE found in this wallet.";
                    btn.disabled = false;
                }
            } catch (err) {
                status.innerText = "Invalid Wallet Address.";
                btn.disabled = false;
            }
        }

        function calculateRisk() {
            const cap = document.getElementById('total-cap').value;
            const risk = document.getElementById('risk-perc').value;
            const vol = document.getElementById('asset-type').value;
            const resBox = document.getElementById('result-box');
            const resText = document.getElementById('result-text');

            if(!cap || !risk) return;

            // Logica: Capitale * (Rischio/100) / Volatilità
            const size = (cap * (risk / 100)) / vol;
            const sodoSize = size.toFixed(3);

            resBox.classList.remove('hidden');
            resText.innerHTML = `<span class="text-emerald-400 font-bold">SUGGESTED SIZE:</span> ${sodoSize} SOL<br><br>
            <span class="text-[10px] uppercase text-white/60 italic">Advice: Se scendi sotto il 20%, abbandona la nave. La prudenza è il motore dei diamanti.</span>`;
        }

        function copyCA() {
            const ca = WAVE_CA;
            navigator.clipboard.writeText(ca);
            const btn = document.getElementById('copy-btn');
            btn.innerText = 'Copied!';
            btn.classList.replace('bg-emerald-400', 'bg-white');
            setTimeout(() => {
                btn.innerText = 'Copy CA';
                btn.classList.replace('bg-white', 'bg-emerald-400');
            }, 2000);
        }
    </script>
</body>
</html>
