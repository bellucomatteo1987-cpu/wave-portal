<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WAVE | Neural Interface</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://terminal.jup.ag/main-v3.js" defer></script>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;700&display=swap" rel="stylesheet">
    <style>
        body { background-color: #000000; color: #ffffff; margin: 0; font-family: 'Space Grotesk', sans-serif; }
        .neon-border { border: 1px solid rgba(20, 241, 149, 0.4); box-shadow: 0 0 25px rgba(20, 241, 149, 0.1); }
        .neon-text { text-shadow: 0 0 10px rgba(20, 241, 149, 0.8); color: #14f195; }
    </style>
</head>
<body class="min-h-screen flex flex-col items-center py-10 px-4 bg-black">

    <header class="mb-12 text-center">
        <h1 class="text-6xl font-black italic neon-text uppercase tracking-tighter">WAVE</h1>
        <p class="text-[10px] tracking-[0.4em] opacity-40 uppercase">Static Token List Mode</p>
    </header>

    <main class="w-full max-w-md">
        <button id="launch-jupiter" class="w-full py-6 neon-border rounded-2xl bg-black text-[#14f195] font-black uppercase tracking-widest hover:bg-[#14f195] hover:text-black transition-all mb-6">
            Lancia Terminale
        </button>

        <div class="bg-[#0a0a0a] border border-white/5 p-6 rounded-2xl relative">
            <div id="lock-overlay" class="absolute inset-0 bg-black/95 z-10 flex flex-col items-center justify-center p-6 rounded-2xl">
                <input type="text" id="user-msg" placeholder="Segnale..." class="w-full p-3 rounded bg-white/5 border border-white/10 text-white text-xs mb-3 outline-none">
                <button id="verify-btn" class="w-full py-3 bg-[#14f195] text-black font-black text-[10px] uppercase rounded">Sblocca Accesso</button>
            </div>
            <div id="msg-feed" class="text-[9px] font-mono opacity-30 space-y-1 italic"></div>
        </div>
    </main>

<script>
    const SUPABASE_URL = 'https://ojfplozwfidjwqwpwcdt.supabase.co';
    const SUPABASE_KEY = 'sb_publishable_McakxoSphNnS09S5kcWhIg_iGo705zF';
    const _supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

    async function initJupiter() {
        if (window.Jupiter) {
            // FORZIAMO IL CARICAMENTO DELLA LISTA TOKEN DA GITHUB PER EVITARE L'ERRORE 404
            const response = await fetch('https://token.jup.ag/all');
            const tokenList = await response.json();

            window.Jupiter.init({
                displayMode: "modal",
                endpoint: "https://mainnet.helius-rpc.com/?api-key=8fb0c505-b909-489e-b063-5bd1816f2b43",
                strictTokenList: false, 
                // Passiamo i token pre-caricati così il widget non deve cercarli sui server bloccati
                tokens: tokenList,
                referralAccount: "BVWRM1aANKbGNsJvijNG4HEU2GtDfGhU3xjf4NYqoSPa",
                platformFeeBps: 20,
            });
        }
    }

    document.getElementById('launch-jupiter').addEventListener('click', () => {
        if (window.Jupiter && window.Jupiter._instance) {
            window.Jupiter.resume();
        } else {
            initJupiter();
        }
    });

    document.getElementById('verify-btn').addEventListener('click', async () => {
        document.getElementById('lock-overlay').style.display = 'none';
        const { data } = await _supabase.from('messages').select('content').order('created_at', { ascending: false }).limit(3);
        if(data) document.getElementById('msg-feed').innerHTML = data.map(m => `<div>> ${m.content}</div>`).join('');
    });
</script>
</body>
</html>
