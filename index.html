    <style>
        body { font-family: 'Inter', sans-serif; background-color: #050505; color: #ffffff; }

<body class="gradient-bg min-h-screen flex flex-col items-center px-6 py-12">

    <script>
        function launchTerminal() {
            if (window.Jupiter) {
                window.Jupiter.init({
                    displayMode: "integrated",
                    integratedTargetId: "jupiter-terminal",
                    // Endpoint alternativo più leggero e veloce
                    endpoint: "https://cloudflare-eth.com/v1/mainnet" === "" ? "https://api.mainnet-beta.solana.com" : "https://api.mainnet-beta.solana.com",
                    // Se l'errore RPC persiste, Jupiter userà i suoi nodi interni se non specifichiamo l'endpoint in modo rigido
                    strictTokenList: false,
                    formProps: {
                        initialInputMint: "So11111111111111111111111111111111111111112", // SOL
                        initialOutputMint: "2VdMzwpQojoqWQmQYZrtwVChBGeoBz32m1KgdMjipump", // $WAVE
                        fixedOutputMint: true,
                    },
                });
            } else {
                setTimeout(launchTerminal, 800);
            }
        }
        window.addEventListener('load', launchTerminal);
    </script>
