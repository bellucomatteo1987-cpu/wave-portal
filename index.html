<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WAVE | Neural Interface</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;700&display=swap" rel="stylesheet">
    <script src="https://terminal.jup.ag/main-v6.js" defer></script>
    <style>
        body { background-color: #000; font-family: 'Space Grotesk', sans-serif; margin: 0; overflow-x: hidden; }
        .emerald-glow { border: 1px solid rgba(52, 211, 153, 0.3); box-shadow: 0 0 40px rgba(52, 211, 153, 0.15); }
        
        /* FIX DEFINITIVO VISIBILITÀ */
        #integrated-terminal { 
            width: 100% !important; 
            min-height: 570px !important; 
            height: 570px !important;
            background: #0b0e11;
            display: block !important;
        }

        .risk-terminal { 
            background: linear-gradient(145deg, rgba(16, 24, 20, 0.95), rgba(6, 10, 8, 0.98)); 
            border: 1px solid #10b981; padding: 20px; border-radius: 1.5rem; 
            width: 100%; max-width: 440px; margin-bottom: 24px;
        }

        .strategy-btn {
            border: 1px solid #064e3b; padding: 6px 10px; border-radius: 6px; 
            font-size: 10px; cursor: pointer; transition: all 0.2s;
            background: transparent; color: #10b981; text-transform: uppercase; font-weight: bold;
        }
        .strategy-btn.active { background: #10b981; color: #000; box-shadow: 0 0 15px rgba(16, 185, 129, 0.4); }

        .modal { display: none; position: fixed; z-index: 9999; left: 0; top: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.98); backdrop-filter: blur(10px); overflow-y: auto; }
        .modal-content { background: #0b0e11; margin: 20px auto; padding: 25px; border: 1px solid #10b981; width: 90%; max-width: 600px; border-radius: 1.5rem; color: #fff; }
    </style>
</head>
<body class="bg-black text-white">

    <main class="flex flex-col items-center py-8 px-4 w-full">
        <h1 class="text-5xl md:text-6xl font-black italic text-emerald-400 mb-2 tracking-tighter uppercase leading-none text-center">Wave</h1>
        <p class="text-emerald-500/50 mb-8 font-light tracking-[0.4em] uppercase text-[8px] italic text-center">Neural Intelligence Interface</p>

        <div class="risk-terminal text-emerald-400 font-mono text-xs shadow-2xl">
            <div class="flex justify-between mb-4 border-b border-emerald-900 pb-2 italic text-[9px]">
                <span class="font-bold tracking-widest">[ NEURAL RISK ENGINE ]</span>
                <span class="animate-pulse text-emerald-500">● ONLINE</span>
            </div>
            
            <div class="space-y-4">
                <div class="flex justify-between items-center">
                    <span class="opacity-80 uppercase text-[9px]">Balance (SOL):</span>
                    <input type="number" id="capitale" class="bg-black border border-emerald-900 text-emerald-400 p-2 rounded w-24 text-right font-bold outline-none" value="10">
                </div>

                <div class="space-y-2">
                    <div class="flex gap-2">
                        <button onclick="setStrategy('blue', 1)" id="btn-blue" class="strategy-btn flex-1">Blue</button>
                        <button onclick="setStrategy('solid', 2)" id="btn-solid" class="strategy-btn active flex-1">Solid</button>
                        <button onclick="setStrategy('degen', 5)" id="btn-degen" class="strategy-btn flex-1">Degen</button>
                    </div>
                </div>

                <div class="mt-4 pt-4 border-t border-emerald-900 bg-emerald-950/20 p-4 rounded-xl border border-emerald-800/30 flex justify-between items-center">
                    <span class="text-white text-sm font-black italic uppercase">Safe Alloc:</span>
                    <span id="risultato" class="text-emerald-400 text-xl font-black tracking-tighter underline">0.200 SOL</span>
                </div>
            </div>
        </div>

        <div class="w-full max-w-[440px] rounded-3xl overflow-hidden emerald-glow mb-8 bg-[#0b0e11]">
            <div id="integrated-terminal"></div>
        </div>

        <div class="flex flex-col gap-6 items-center w-full">
            <button onclick="openModal()" class="text-emerald-500/60 font-mono text-[9px] uppercase tracking-[0.2em] border-b border-emerald-900 pb-1 italic">
                [ Protocol Manifest ]
            </button>

            <a href="https://dub.sh/WAVEPortal" target="_blank" class="w-full max-w-[300px]">
                <div class="py-4 bg-emerald-500/10 border border-emerald-500/30 rounded-full text-emerald-400 font-bold tracking-[0.2em] text-xs text-center uppercase italic group-hover:bg-emerald-500/20 transition-all">
                    Join WAVE Portal
                </div>
            </a>
        </div>
    </main>

    <script>
        const REFERRAL_ACCOUNT = "BVWRM1aANKbGNsJvijNG4HEU2GtDfGhU3xjf4NYqoSPa";

        function launchJupiter() {
            if (window.Jupiter && document.getElementById('integrated-terminal')) {
                console.log("WAVE: Initializing Jupiter...");
                window.Jupiter.init({
                    displayMode: "integrated",
                    integratedTargetId: "integrated-terminal",
                    endpoint: "https://mainnet.helius-rpc.com/?api-key=8fb0c505-b909-489e-b063-5bd1816f2b43",
                    formProps: {
                        referralAccount: REFERRAL_ACCOUNT,
                        referralFee: 100 
                    },
                });
            } else {
                console.log("WAVE: Waiting for SDK...");
                setTimeout(launchJupiter, 1000);
            }
        }

        // Risk Logic
        const capInput = document.getElementById('capitale');
        const resDiv = document.getElementById('risultato');
        let currentRisk = 2;

        function calculateRisk() {
            const cap = parseFloat(capInput.value) || 0;
            resDiv.innerText = `${(cap * (currentRisk / 100)).toFixed(3)} SOL`;
        }

        function setStrategy(name, percent) {
            currentRisk = percent;
            document.querySelectorAll('.strategy-btn').forEach(btn => btn.classList.remove('active'));
            document.getElementById(`btn-${name}`).classList.add('active');
            calculateRisk();
        }

        function openModal() { document.getElementById('manifestModal').style.display = 'block'; document.body.style.overflow = 'hidden'; }
        function closeModal() { document.getElementById('manifestModal').style.display = 'none'; document.body.style.overflow = 'auto'; }

        // Avvio
        window.addEventListener('DOMContentLoaded', launchJupiter);
        calculateRisk();
    </script>
</body>
</html>
