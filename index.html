<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WAVE | Neural Interface</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;700&display=swap" rel="stylesheet">
    <script src="https://terminal.jup.ag/main-v6.js"></script>
    <style>
        body { background-color: #000; font-family: 'Space Grotesk', sans-serif; margin: 0; color: white; }
        .emerald-glow { border: 1px solid rgba(52, 211, 153, 0.4); box-shadow: 0 0 30px rgba(16, 185, 129, 0.2); }
        
        /* CONTENITORE TERMINALE: Forziamo altezza e visibilità */
        #jupiter-terminal-container { 
            width: 100% !important; 
            min-height: 570px !important;
            height: 570px !important;
            background: #0b0e11;
            position: relative;
            display: block !important;
            visibility: visible !important;
            opacity: 1 !important;
            z-index: 10;
        }

        .risk-terminal { 
            background: #060a08; border: 1px solid #10b981; padding: 20px; border-radius: 1.5rem; 
            width: 100%; max-width: 420px; margin-bottom: 24px;
        }

        .strategy-btn {
            border: 1px solid #064e3b; padding: 8px; border-radius: 8px; 
            font-size: 10px; cursor: pointer; background: transparent; color: #10b981;
            font-weight: bold; flex: 1; text-align: center;
        }
        .strategy-btn.active { background: #10b981; color: #000; }

        .modal { display: none; position: fixed; z-index: 100; left: 0; top: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); backdrop-filter: blur(8px); }
    </style>
</head>
<body class="flex flex-col items-center p-4">

    <header class="text-center mt-6 mb-8">
        <h1 class="text-6xl font-black italic text-emerald-400 tracking-tighter uppercase leading-none">Wave</h1>
        <p class="text-emerald-500/50 font-light tracking-[0.3em] uppercase text-[9px] italic mt-2">Neural Intelligence Interface</p>
    </header>

    <div class="risk-terminal text-emerald-400 font-mono text-xs">
        <div class="flex justify-between mb-4 border-b border-emerald-900 pb-2 italic text-[9px]">
            <span>[ RISK ENGINE v2.2 ]</span>
            <span class="animate-pulse">● SYSTEM LIVE</span>
        </div>
        <div class="space-y-4">
            <div class="flex justify-between items-center">
                <span class="uppercase opacity-70">Balance (SOL):</span>
                <input type="number" id="capitale" class="bg-black border border-emerald-900 text-emerald-400 p-2 rounded w-24 text-right font-bold" value="10">
            </div>
            <div class="flex gap-2">
                <button onclick="setStrategy('blue', 1)" id="btn-blue" class="strategy-btn">Blue</button>
                <button onclick="setStrategy('solid', 2)" id="btn-solid" class="strategy-btn active">Solid</button>
                <button onclick="setStrategy('degen', 5)" id="btn-degen" class="strategy-btn">Degen</button>
            </div>
            <div class="pt-4 border-t border-emerald-900 flex justify-between items-center bg-emerald-950/20 p-3 rounded-lg">
                <span class="text-white font-bold italic uppercase">Safe Alloc:</span>
                <span id="risultato" class="text-emerald-400 text-xl font-bold underline">0.200 SOL</span>
            </div>
        </div>
    </div>

    <div class="w-full max-w-[420px] rounded-3xl overflow-hidden emerald-glow mb-8">
        <div id="jupiter-terminal-container"></div>
    </div>

    <div class="flex flex-col gap-6 items-center w-full">
        <button onclick="document.getElementById('m').style.display='block'" class="text-emerald-500/50 text-[10px] uppercase tracking-widest border-b border-emerald-900 pb-1 italic">
            [ Protocol Manifest ]
        </button>
        <a href="https://dub.sh/WAVEPortal" target="_blank" class="w-full max-w-[300px] py-4 bg-emerald-500/10 border border-emerald-500/40 rounded-full text-emerald-400 font-bold text-center text-xs uppercase italic transition-all hover:bg-emerald-500/20">
            Join WAVE Portal
        </a>
    </div>

    <div id="m" class="modal" onclick="this.style.display='none'">
        <div class="bg-[#0b0e11] border border-emerald-500 m-10 p-6 rounded-2xl text-xs text-emerald-100 italic space-y-4" onclick="event.stopPropagation()">
            <p class="font-bold text-emerald-400 uppercase">WAVE Protocol</p>
            <p>Neural routing via Jupiter V2. Fee: 100bps.</p>
            <button onclick="document.getElementById('m').style.display='none'" class="text-emerald-500 underline uppercase">Close</button>
        </div>
    </div>

    <script>
        const REF = "BVWRM1aANKbGNsJvijNG4HEU2GtDfGhU3xjf4NYqoSPa";
        const RPC = "https://mainnet.helius-rpc.com/?api-key=8fb0c505-b909-489e-b063-5bd1816f2b43";

        function startJupiter() {
            const container = document.getElementById('jupiter-terminal-container');
            if (window.Jupiter && container) {
                console.log("Initializing Jupiter...");
                window.Jupiter.init({
                    displayMode: "integrated",
                    integratedTargetId: "jupiter-terminal-container",
                    endpoint: RPC,
                    formProps: {
                        referralAccount: REF,
                        referralFee: 100 
                    },
                });
            } else {
                console.log("Jupiter not ready, retrying...");
                setTimeout(startJupiter, 500);
            }
        }

        // Risk Logic
        let risk = 2;
        function calculate() {
            const cap = parseFloat(document.getElementById('capitale').value) || 0;
            document.getElementById('risultato').innerText = `${(cap * (risk / 100)).toFixed(3)} SOL`;
        }
        function setStrategy(n, p) {
            risk = p;
            document.querySelectorAll('.strategy-btn').forEach(b => b.classList.remove('active'));
            document.getElementById('btn-'+n).classList.add('active');
            calculate();
        }

        document.getElementById('capitale').addEventListener('input', calculate);
        
        // Lancio manuale appena il DOM è pronto
        window.addEventListener('load', startJupiter);
    </script>
</body>
</html>
