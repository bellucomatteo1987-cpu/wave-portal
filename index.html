<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WAVE | Neural Interface</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://terminal.jup.ag/main-v6.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;700&display=swap" rel="stylesheet">
    <style>
        body { background-color: #000; font-family: 'Space Grotesk', sans-serif; margin: 0; overflow-x: hidden; }
        .emerald-glow { border: 1px solid rgba(52, 211, 153, 0.3); box-shadow: 0 0 40px rgba(52, 211, 153, 0.15); }
        #integrated-terminal { width: 100%; min-height: 570px; display: flex; align-items: center; justify-content: center; background: #0b0e11; }
        .risk-terminal { background: rgba(16, 24, 20, 0.9); border: 1px dashed #10b981; padding: 20px; border-radius: 1rem; width: 100%; max-width: 440px; margin-bottom: 20px; }
    </style>
</head>
<body class="bg-black text-white">

    <main class="flex flex-col items-center justify-center min-h-screen py-10 px-4">
        <h1 class="text-6xl font-black italic text-emerald-400 mb-2 tracking-tighter uppercase text-center">Wave</h1>
        
        <div class="risk-terminal text-emerald-400 font-mono text-xs">
            <div class="flex justify-between mb-4 border-b border-emerald-900 pb-2 italic">
                <span>[ Risk Terminal v.1.3 ]</span>
                <span id="status-led" class="animate-pulse">● In attesa di Jupiter...</span>
            </div>
            <div class="flex justify-between items-center">
                <span>CAPITALE (SOL):</span>
                <input type="number" id="capitale" class="bg-black border border-emerald-500 p-1 w-20 text-right" value="10">
            </div>
            <div class="mt-4 pt-3 border-t border-emerald-900 flex justify-between items-center text-sm font-bold bg-emerald-950/30 p-2 rounded">
                <span>ESPOSIZIONE (2%):</span>
                <span id="risultato" class="text-white">0.200 SOL</span>
            </div>
        </div>

        <div class="w-full max-w-[440px] rounded-3xl overflow-hidden emerald-glow bg-[#0b0e11] mb-8">
    <iframe 
        src="https://jup.ag/swap/SOL-USDC?feeBps=100&referrer=BVWRM1aANKbGNsJvijNG4HEU2GtDfGhU3xjf4NYqoSPa&platformFeeBps=100" 
        class="w-full h-[600px] border-none"
        title="WAVE Terminal"
        allow="clipboard-read; clipboard-write"
    ></iframe>
</div>
        <a href="https://dub.sh/WAVEPortal" target="_blank" class="group flex flex-col items-center transition-all hover:scale-105">
            <div class="px-8 py-3 bg-emerald-500/10 border border-emerald-500/30 rounded-full text-emerald-400 font-bold tracking-widest text-sm hover:bg-emerald-500/20 transition-all uppercase">
                WAVE Whales Portal
            </div>
        </a>
    </main>

    <script>
        function initJupiter() {
            const loadingText = document.getElementById('loading-text');
            const statusLed = document.getElementById('status-led');

            if (window.Jupiter) {
                console.log("WAVE: Libreria trovata. Avvio...");
                try {
                    window.Jupiter.init({
                        displayMode: "integrated",
                        integratedTargetId: "integrated-terminal",
                        endpoint: "https://mainnet.helius-rpc.com/?api-key=8fb0c505-b909-489e-b063-5bd1816f2b43",
                        formProps: {
                            platformFeeBps: 100, // 1% FEE FORZATA
                        },
                        referrerAccount: "BVWRM1aANKbGNsJvijNG4HEU2GtDfGhU3xjf4NYqoSPa"
                    });
                    loadingText.style.display = 'none';
                    statusLed.innerText = "● Protocollo Online";
                    statusLed.classList.remove('text-emerald-500');
                    statusLed.classList.add('text-blue-400');
                } catch (e) {
                    console.error("WAVE: Errore init:", e);
                    loadingText.innerText = "Errore di Iniezione Terminale";
                }
            } else {
                console.log("WAVE: Riprovo tra 500ms...");
                setTimeout(initJupiter, 500);
            }
        }

        // Avvio immediato
        initJupiter();

        // Calcolo Rischio
        document.getElementById('capitale').addEventListener('input', (e) => {
            document.getElementById('risultato').innerText = `${(parseFloat(e.target.value || 0) * 0.02).toFixed(3)} SOL`;
        });
    </script>
</body>
</html>
