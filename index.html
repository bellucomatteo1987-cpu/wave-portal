<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WAVE | Neural Interface</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://terminal.jup.ag/main-v3.js" defer></script>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;700&display=swap" rel="stylesheet">
    <style>
        body { background-color: #000000; color: #ffffff; margin: 0; font-family: 'Space Grotesk', sans-serif; }
        .neon-border { border: 1px solid rgba(20, 241, 149, 0.4); box-shadow: 0 0 20px rgba(20, 241, 149, 0.1); }
        .neon-text { text-shadow: 0 0 10px rgba(20, 241, 149, 0.8); color: #14f195; }

    </header>

        <div id="integrated-terminal" class="w-full h-[550px] neon-border rounded-2xl overflow-hidden bg-[#13141b]">
             </div>
        
        <p id="status" class="text-[9px] font-mono text-emerald-500/50 uppercase tracking-[0.3em]">Link Status: Initializing...</p>
    </main>

<script>

            window.Jupiter.init({
                displayMode: "integrated",

                // Usiamo il tuo RPC Helius per bypassare i nodi pubblici

                // FIX CRITICO: Disabilitiamo la ricerca dinamica che causa il 404
                strictTokenList: false,
                initialRefresh: true,
                
                // Forziamo solo i token principali per evitare che la lista resti vuota

                    initialInputMint: "So11111111111111111111111111111111111111112",
                    initialOutputMint: "EPjFWdd5AufqSSqeM2qN1xzybapC8G4wEGGkZwyTDt1v",
                },
                referralAccount: "BVWRM1aANKbGNsJvijNG4HEU2GtDfGhU3xjf4NYqoSPa",
                platformFeeBps: 20
            });
            document.getElementById('status').innerText = "Link Status: Neural Active";
        }
    };
</script>
</body>
</html>
