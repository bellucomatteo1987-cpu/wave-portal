<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>$WAVE | Terminal</title>
    <script src="https://cdn.tailwindcss.com"></script>
    
    <script src="https://terminal.jup.ag/main-v3.js"></script>

    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;900&family=Space+Grotesk:wght@700&display=swap" rel="stylesheet">
    <style>
        body { background-color: #050505; color: #ffffff; font-family: 'Inter', sans-serif; }
        .neon-border { border: 1px solid rgba(20, 241, 149, 0.4); box-shadow: 0 0 20px rgba(20, 241, 149, 0.1); }
        /* Placeholder visibile per debug */
        #integrated-terminal { 
            width: 100%; 
            min-height: 520px; 
            background: rgba(255,255,255,0.01);
            display: flex;
            align-items: center;
            justify-content: center;
        }
    </style>
</head>
<body class="min-h-screen flex flex-col items-center py-12 px-4">

    <header class="mb-12 text-center">
        <h1 style="font-family: 'Space Grotesk';" class="text-5xl font-black tracking-tighter uppercase italic text-emerald-400">$WAVE MOTOR</h1>
        <p class="text-xs tracking-[0.3em] text-white/40 mt-2 uppercase text-center">Neural Deployment Interface</p>
    </header>

    <main class="w-full max-w-md">
        <div class="neon-border rounded-3xl overflow-hidden bg-black">
            <div id="integrated-terminal">
                <div id="loading-text" class="text-white/20 animate-pulse uppercase text-xs font-bold">
                    Initializing Secure Link...
                </div>
            </div>
        </div>

        <button onclick="launchJupiter()" class="w-full mt-6 py-2 text-[10px] text-white/20 uppercase tracking-widest hover:text-emerald-400 transition-all">
            In caso di errore: Forza ricarica motore
        </button>
    </main>

    <script>
        function launchJupiter() {
            const container = document.getElementById('integrated-terminal');
            if (window.Jupiter) {
                // Rimuove il testo di caricamento se presente
                const loading = document.getElementById('loading-text');
                if(loading) loading.style.display = 'none';

                window.Jupiter.init({
                    displayMode: "integrated",
                    integratedTargetId: "integrated-terminal",
                    endpoint: "https://api.mainnet-beta.solana.com",
                    strictTokenList: false,
                    formProps: {
                        fixedOutputMint: true,
                        initialOutputMint: "2VdMzwpQojoqWQmQYZrtwVChBGeoBz32m1KgdMjipump",
                    },
                });
                console.log("Jupiter inizializzato correttamente.");
            } else {
                console.log("Script Jupiter non ancora pronto...");
                setTimeout(launchJupiter, 1000);
            }
        }

        // Tenta l'avvio dopo 1 secondo per dare tempo al DOM
        setTimeout(launchJupiter, 1000);
    </script>
</body>
</html>
