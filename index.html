<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WAVE | Neural Interface</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://terminal.jup.ag/main-v3.js" defer></script>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;700&display=swap" rel="stylesheet">
    <style>
        body { background-color: #000000; color: #ffffff; margin: 0; overflow-x: hidden; font-family: sans-serif; }
        .neon-border { border: 1px solid rgba(20, 241, 149, 0.4); box-shadow: 0 0 25px rgba(20, 241, 149, 0.1); }
        .neon-text { text-shadow: 0 0 10px rgba(20, 241, 149, 0.8); color: rgba(20, 241, 149, 1); }
        .font-vision { font-family: 'Space Grotesk', sans-serif; }
        
        /* FIX: Altezza minima garantita e rimosso overflow per evitare tagli grafici */
        .terminal-container { 
            width: 100%; 
            min-height: 580px; 
            background: #000; 
            position: relative;
        }
        
        #persistent-echo-list::-webkit-scrollbar { width: 4px; }
        #persistent-echo-list::-webkit-scrollbar-thumb { background: rgba(20, 241, 149, 0.3); border-radius: 10px; }
    </style>
</head>
<body class="min-h-screen flex flex-col items-center py-10 px-4 bg-[radial-gradient(circle_at_top,_var(--tw-gradient-stops))] from-emerald-900/10 via-black to-black">

    <header class="mb-8 text-center">
        <div class="mb-5 inline-block">
            <img src="logo.png" alt="WAVE Logo" class="w-32 h-32 rounded-full neon-border object-cover mx-auto">
        </div>
        <h1 class="text-6xl font-black font-vision tracking-tighter uppercase italic neon-text">WAVE INTERFACE</h1>
        <p class="text-[10px] tracking-[0.3em] text-white/40 mt-2 uppercase italic">Solana Neural Monitoring v3.5</p>
    </header>

    <main class="w-full max-w-md space-y-6">
        <div class="neon-border rounded-3xl bg-black p-1">
            <div id="integrated-terminal" class="terminal-container"></div>
        </div>

        <div class="bg-black border border-emerald-500/20 p-6 rounded-2xl relative overflow-hidden shadow-2xl">
            <div id="lock-overlay" class="absolute inset-0 bg-black/95 backdrop-blur-md z-10 flex flex-col items-center justify-center p-6 text-center">
                <h2 class="text-emerald-400 font-vision font-bold uppercase tracking-widest mb-1 text-sm italic">THE WAVE ECHO</h2>
                <input type="text" id="user-msg" placeholder="Write a degen phrase..." maxlength="50" class="w-full p-3 rounded-lg mb-3 text-xs outline-none border border-white/10 bg-white/5 text-white focus:border-emerald-400">
                <button id="verify-btn" class="w-full py-3 bg-[#10f195] text-black font-black rounded-lg text-[10px] uppercase tracking-widest hover:bg-white transition-all shadow-[0_0_15px_rgba(16,241,149,0.3)]">SEND & ACCESS</button>
            </div>

            <div class="space-y-6">
                <div>
                    <p class="text-[8px] text-emerald-400/60 uppercase font-bold mb-3 tracking-widest italic">NEURAL PULSE FEED:</p>
                    <ul id="persistent-echo-list" class="text-[10px] font-mono text-white/40 space-y-2 overflow-y-auto max-h-[80px] pr-2 list-none"></ul>
                </div>

                <div class="space-y-4">
                    <h3 class="text-xl font-bold font-vision text-emerald-400 uppercase italic text-center">Risk Terminal</h3>
                    <div class="space-y-3">
                        <input type="number" id="total-cap" placeholder="Total SOL Balance" class="w-full p-3 rounded-lg text-xs bg-white/5 border border-white/10 text-white outline-none">
                        <input type="number" id="risk-perc" placeholder="Risk % (e.g. 1)" class="w-full p-3 rounded-lg text-xs bg-white/5 border border-white/10 text-white outline-none">
                        <select id="asset-type" class="w-full p-3 rounded-lg text-[10px] bg-white/5 border border-white/10 text-white outline-none cursor-pointer">
                            <option value="0.1">BLUE CHIP (Safe)</option>
                            <option value="0.3">VOLATILE (Meme)</option>
                            <option value="0.6">DEGEN (Danger)</option>
                        </select>
                        <button id="calc-btn" class="w-full py-3 border border-emerald-500/50 text-emerald-400 font-black rounded-xl text-[10px] uppercase hover:bg-emerald-500 hover:text-black transition-all">Analyze Exposure</button>
                    </div>
                    <div id="result-box" class="hidden mt-4 p-4 bg-emerald-500/5 border border-emerald-500/20 rounded-xl text-center">
                        <p id="result-text" class="text-[11px] font-vision leading-tight text-white/90 italic"></p>
                    </div>
                </div>
            </div>
        </div>
    </main>

<script>
    const SUPABASE_URL = 'https://ojfplozwfidjwqwpwcdt.supabase.co';
    const SUPABASE_KEY = 'sb_publishable_McakxoSphNnS09S5kcWhIg_iGo705zF';
    const _supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

    // Inizializzazione corretta Jupiter Terminal con Referral
    window.addEventListener('load', () => {
        if (window.Jupiter) {
            window.Jupiter.init({
                displayMode: "integrated",
                integratedTargetId: "integrated-terminal",
                endpoint: "https://api.mainnet-beta.solana.com",
                strictTokenList: false,
                formProps: {
                    initialInputMint: "So11111111111111111111111111111111111111112", // SOL
                    initialOutputMint: "EPjFWdd5AufqSSqeM2qN1xzybapC8G4wEGGkZwyTDt1v", // USDC
                },
                referralAccount: "BVWRM1aANKbGNsJvijNG4HEU2GtDfGhU3xjf4NYqoSPa",
                platformFeeBps: 20, // Commissione 0.2%
            });
        }
    });

    document.addEventListener('DOMContentLoaded', () => {
        const verifyBtn = document.getElementById('verify-btn');
        const calcBtn = document.getElementById('calc-btn');
        const msgInput = document.getElementById('user-msg');
        const persistentList = document.getElementById('persistent-echo-list');
        const overlay = document.getElementById('lock-overlay');

        const loadGlobalEcho = async () => {
            const { data, error } = await _supabase
                .from('messages')
                .select('content')
                .order('created_at', { ascending: false })
                .limit(10);
            if (!error && data) {
                persistentList.innerHTML = data.map(m => `<li class="border-l border-emerald-500/30 pl-2 py-0.5 italic truncate opacity-80">${m.content}</li>`).join('');
            }
        };

        loadGlobalEcho();

        verifyBtn.addEventListener('click', async () => {
            const signal = msgInput.value.trim() || "Signal Synchronized";
            verifyBtn.innerText = "BROADCASTING...";
            const { error } = await _supabase.from('messages').insert([{ content: signal }]);
            if (!error) await loadGlobalEcho();

            setTimeout(() => {
                overlay.style.transition = "all 0.6s ease-in-out";
                overlay.style.opacity = "0";
                overlay.style.pointerEvents = "none";
                setTimeout(() => { overlay.style.display = 'none'; }, 600);
            }, 400); 
        });

        calcBtn.addEventListener('click', () => {
            const cap = parseFloat(document.getElementById('total-cap').value);
            const rsk = parseFloat(document.getElementById('risk-perc').value);
            const vol = parseFloat(document.getElementById('asset-type').value);
            if (isNaN(cap) || isNaN(rsk)) return;
            
            let size = (cap * (rsk / 100)) / vol;
            if (size > cap) size = cap;

            document.getElementById('result-box').classList.remove('hidden');
            document.getElementById('result-text').innerHTML = `RECOMMENDED SIZE: ${size.toFixed(3)} SOL`;
        });
    });
</script>
</body>
</html>
