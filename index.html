<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>$WAVE | Terminal</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://terminal.jup.ag/main-v3.js" defer></script>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@700&display=swap" rel="stylesheet">
    <style>
        body { background-color: #050505; color: #ffffff; }
        .neon-border { border: 1px solid rgba(20, 241, 149, 0.4); box-shadow: 0 0 20px rgba(20, 241, 149, 0.1); }
        #jupiter-terminal { width: 100%; min-height: 520px; background: rgba(255,255,255,0.02); }
    </style>
</head>
<body class="min-h-screen flex flex-col items-center py-12 px-4 bg-black">

    <header class="mb-12 text-center">
        <h1 style="font-family: 'Space Grotesk';" class="text-5xl font-black tracking-tighter uppercase italic text-emerald-400">$WAVE MOTOR</h1>
        <p class="text-[10px] tracking-[0.3em] text-white/40 mt-2 uppercase">Neural Interface v3.0</p>
    </header>

    <main class="w-full max-w-md">
        <div class="neon-border rounded-3xl overflow-hidden bg-black p-1">
            <div id="jupiter-terminal"></div>
        </div>
    </main>

    <script>
        // Funzione per inizializzare con un endpoint più stabile
        function initWAVE() {
            if (window.Jupiter) {
                window.Jupiter.init({
                    displayMode: "integrated",
                    integratedTargetId: "jupiter-terminal",
                    // Usiamo l'endpoint ottimizzato di Jupiter/Helius
                    endpoint: "https://mainnet.helius-rpc.com/?api-key=069695b2-3023-42e4-8d96-03f429737651",
                    strictTokenList: false,
                    formProps: {
                        initialInputMint: "So11111111111111111111111111111111111111112",
                        initialOutputMint: "2VdMzwpQojoqWQmQYZrtwVChBGeoBz32m1KgdMjipump",
                        fixedOutputMint: true,
                    },
                });
            } else {
                setTimeout(initWAVE, 500); // Riprova se lo script non è pronto
            }
        }

        window.addEventListener('load', initWAVE);
    </script>
</body>
</html>
